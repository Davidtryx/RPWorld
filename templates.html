<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RPWorld | Creator Studio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="studio-bg">
    <div class="container">
        <header>
            <h1>New Roleplay: <span id="selected-genre">Nation RP</span></h1>
            <p>Fill out the blueprint below to launch your world.</p>
        </header>

        <form id="rp-builder">
            <section class="form-group">
                <label>World Name</label>
                <input type="text" placeholder="e.g. The Iron Realms">
            </section>

            <!-- This section changes based on the genre chosen -->
            <section id="dynamic-fields" class="form-group">
                <label>Starting Year (NRP Specific)</label>
                <input type="number" value="2026">
                
                <label>Map URL</label>
                <input type="url" placeholder="Link to your world map">
            </section>

            <button type="submit" class="btn-primary">Launch World</button>
        </form>
    </div>
</body>
</html>
